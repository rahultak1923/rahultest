<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Digital Whopper - Jaipur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="customPreloader" class="preloader-overlay">
  <div class="preloader-content">
    <h2 class="preloader-brand">Digital Whopper</h2>
    <div class="preloader-spinner">
      <span class="spinner-dot"></span>
      <span class="spinner-dot"></span>
    </div>
  </div>
</div>

<div class="custom-cursor" id="customCursor"></div>
<div class="custom-cursor-blur" id="customCursorBlur"></div>

<header id="mainHeader"></header>

<section class="hero scroll-reveal" style="padding: 140px 0 20px;">
  <div class="pink-blob"></div>
  <div class="purple-ambient-glow"></div>
  
  <div class="stars-container">
    <div class="star s1 color-pink"></div><div class="star s2 color-orange"></div><div class="star s3 color-cyan"></div>
    <div class="star s4 color-gold"></div><div class="star s5 color-pink"></div><div class="star s6 color-cyan"></div>
  </div>

  <div class="wrap text-shine" style="text-align: center;">
    <div class="eyebrow">Connect Center</div>
    <h1>Let's Build Something <span class="highlight text-shine">Whopping</span></h1>
    <p class="lead" style="margin: 15px auto 0; max-width: 620px;">Have a project in mind or want to scale your current operations? Send us a transmission below.</p>
  </div>
</section>

<section class="scroll-reveal" style="padding: 20px 0 80px;">
  <div class="wrap">
    <div class="contact-split-grid">
      
      <div class="contact-info-panel">
        <a href="https://wa.me/916200379161" target="_blank" class="contact-meta-card">
          <div class="meta-icon">💬</div>
          <div class="meta-texts">
            <b>WhatsApp</b>
            <span>Chat with Whoppy — we reply fast</span>
          </div>
        </a>

        <a href="mailto:hello@digitalwhopper.com" class="contact-meta-card">
          <div class="meta-icon">✉️</div>
          <div class="meta-texts">
            <b>Email</b>
            <span>hello@digitalwhopper.com</span>
          </div>
        </a>
      </div>

      <div class="contact-form-panel">
        <span class="form-eyebrow">MESSAGE</span>
        <div class="form-input-container">
          <textarea id="projectMessage" placeholder="Tell us about your project..." rows="4"></textarea>
        </div>
        <button class="btn btn-gold form-submit-trigger" id="submitFormBtn">Send enquiry ✦</button>
      </div>

    </div>

    <div class="contact-map-wrapper">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3559.8863618151996!2d75.8184518761273!3d26.843538463110292!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x396db6641883c833%3A0xb3513a967f6b0f9f!2sDigital%20Whopper!5e0!3m2!1sen!2sin!4v1720257500000!5m2!1sen!2sin" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>

  </div>
</section>

<footer id="footer"></footer>

<script src="script.js"></script>
</body>
</html>
