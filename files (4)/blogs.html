<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blogs & Chronicles | Digital Whopper - Jaipur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styleb.css">
<style>
  /* ==========================================================================
     🖼️ EXCLUSIVE MAGAZINE-LAYOUT GRAPHIC OVERRIDES (DIFFERENT FROM PORTFOLIO)[cite: 10]
     ========================================================================== */
  .logo-img-asset {
    height: 34px;
    width: auto;
    object-fit: contain;
    display: inline-block;
    margin-right: 2px;
  }

  .blog-hero {
    padding: 170px 0 30px !important;
    position: relative;
    z-index: 2;
    text-align: center;
  }

  /* 🎯 FEATURED HERO CARD ARCHITECTURE[cite: 10] */
  .featured-blog-card {
    background: #ffffff;
    border: 1px solid rgba(0, 82, 255, 0.08);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--card-shadow-default);
    display: flex;
    flex-direction: column;
    height: 100%;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .featured-blog-card:hover {
    transform: translateY(-6px);
    border-color: #0052ff;
    box-shadow: var(--card-shadow-active);
  }
  .featured-img-frame {
    width: 100%;
    height: 340px;
    overflow: hidden;
  }
  .featured-img-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
  }
  .featured-blog-card:hover .featured-img-frame img {
    transform: scale(1.03);
  }

  /* 🌟 FIRST CARD ONLY: TITLE STYLE MODULE */
  .featured-title-custom {
    font-family: 'Sora', sans-serif; 
    font-size: 24px; 
    font-weight: 700; 
    color: var(--text); 
    line-height: 1.3; 
    margin: 6px 0 12px;
    width: 100%;
  }

  /* 🌟 FIRST CARD ONLY: ONE LINE DESCRIPTION LOCK */
  .featured-desc-truncate {
    color: var(--muted); 
    font-size: 14.5px; 
    line-height: 1.6; 
    margin-bottom: 24px;
    display: -webkit-box !important;
    -webkit-line-clamp: 1 !important; /* सिर्फ 1 लाइन पर लॉक रखेगा */
    -webkit-box-orient: vertical !important;
    overflow: hidden !important;
  }

  /* 📦 PREMIUM GRID CORE Sync[cite: 10] */
  .blog-master-card {
    background: #ffffff;
    border: 1px solid rgba(0, 82, 255, 0.06);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--card-shadow-default);
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    flex-direction: column;
    cursor: pointer;
    width: 100%;
  }
  .blog-master-card:hover {
    transform: translateY(-8px);
    border-color: rgba(0, 82, 255, 0.15);
    box-shadow: var(--card-shadow-active);
  }

  /* Image Aspect Thumb Frame[cite: 10] */
  .blog-image-thumb-frame {
    width: 100%;
    height: 190px;
    overflow: hidden;
    position: relative;
    border-bottom: 1px solid rgba(0, 82, 255, 0.05);
  }
  .blog-image-thumb-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .blog-master-card:hover .blog-image-thumb-frame img {
    transform: scale(1.05);
  }

  /* 🧬 ACCENT DETAILS[cite: 10] */
  .blog-meta-strip {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .author-pill {
    background: rgba(0, 82, 255, 0.05);
    color: #0052ff;
    padding: 3px 10px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 11px;
  }
  .blog-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: auto;
    padding-top: 14px;
    border-top: 1px solid rgba(0, 82, 255, 0.06);
  }
  .blog-meta-badge {
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    color: var(--muted);
  }
  .read-anchor-btn {
    font-size: 13px;
    font-weight: 700;
    color: #0052ff;
    text-decoration: none;
  }

  /* 📱 ADVANCED FLUID RESPONSIVE SYSTEM OVERRIDES[cite: 10] */
  @media(max-width: 1200px) {
    .magazine-top-split { grid-template-columns: 1fr !important; gap: 32px !important; }
    .magazine-bottom-grid { grid-template-columns: repeat(2, 1fr) !important; }
  }
  @media(max-width: 700px) {
    .blog-right-top-grid { grid-template-columns: 1fr !important; }
    .magazine-bottom-grid { grid-template-columns: 1fr !important; gap: 24px !important; }
    .blog-hero h1 { font-size: 32px !important; }
  }
</style>
</head>
<body>

<div id="customPreloader" class="preloader-overlay">
  <div class="preloader-content">
    <h2 class="preloader-brand">Digital Whopper</h2>
    <div class="preloader-spinner">
      <span class="spinner-dot"></span>
      <span class="spinner-dot"></span>
    </div>
  </div>
</div>

<div class="custom-cursor" id="customCursor"></div>
<div class="custom-cursor-blur" id="customCursorBlur"></div>

<header id="mainHeader"></header>

<section class="blog-hero scroll-reveal">
  <div class="pink-blob"></div>
  <div class="purple-ambient-glow"></div>
  <div class="stars-container"><canvas id="aiNodeCanvas"></canvas></div>

  <div class="wrap">
    <div class="eyebrow">The Intel Hub</div>
    <h1 style="font-size: clamp(34px, 4.5vw, 54px); font-weight: 800; color: var(--text); line-height: 1.2; letter-spacing: -0.02em;">
      The Digital Whopper <span class="highlight text-shine">Blog's</span>
    </h1>
    <p class="lead" style="margin: 16px auto 0; max-width: 640px;">Bespoke marketing strategy manuals, platform engineering insights, and algorithmic breakdowns designed carefully by our growth engineers.</p>
  </div>
</section>

<section class="scroll-reveal" style="padding: 10px 0;">
  <div class="wrap2" style="max-width: 1300px; margin: 0 auto; padding: 0 16px;">
    
    <!-- 🌟 ORIGINAL DESIGN RATIO PRESERVED[cite: 10] -->
    <div class="magazine-top-split" style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px; width: 100%;">
      
      <div class="blog-left-hero-column" id="featuredContainer"></div>

      <div class="blog-right-top-grid" id="rightTopGridContainer" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 32px;"></div>
      
    </div>

    <div class="magazine-bottom-grid" id="magazineBottomGridContainer" style="display: none; grid-template-columns: repeat(4, 1fr); gap: 32px; width: 100%; margin-top: 32px;"></div>

  </div>
</section>

<footer id="footer"></footer>

<script src="blog-data.js"></script>
<script src="scriptb.js"></script>

<!-- ==========================================================================
     🕹️ 100% AUTOMATIC DATA LOADER JAVASCRIPT ENGINE (FIXED LOOP)[cite: 10]
     ========================================================================== -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof blogDatabase === 'undefined' || blogDatabase.length === 0) return;

    const featuredContainer = document.getElementById('featuredContainer');
    const rightTopGridContainer = document.getElementById('rightTopGridContainer');
    const magazineBottomGridContainer = document.getElementById('magazineBottomGridContainer');

    // 🌟 1. INDEX 0: Left Featured Box[cite: 10]
    if (blogDatabase[0]) {
      const hero = blogDatabase[0];
      
      // ⚡ 5-Word Truncation Logic Framework
      const wordsArray = hero.title.split(' ');
      const truncatedTitle = wordsArray.length > 5 
        ? wordsArray.slice(0, 5).join(' ') + ' ...' 
        : hero.title;

      // Body Padding remains 11px Top/Bottom and 32px Left/Right
      featuredContainer.innerHTML = `
        <div class="featured-blog-card" onclick="window.location.href='blog-detailsw.html?id=${hero.id}'">
          <div class="featured-img-frame">
            <img src="${hero.image}" alt="${hero.title}">
          </div>
          <div style="padding: 11px 32px 11px 32px; display: flex; flex-direction: column; flex-grow: 1;">
            <div class="blog-meta-strip">
              <span class="author-pill">${hero.tag}</span>
              <span>•</span>
              <span>${hero.readTime}</span>
            </div>
            <h2 class="featured-title-custom">
              ${truncatedTitle}
            </h2>
            <p class="featured-desc-truncate">
              ${hero.intro}
            </p>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 16px; border-top: 1px solid rgba(0, 82, 255, 0.06);">
              <span style="font-size: 12.5px; color: var(--muted); font-weight: 500;">🗓️ ${hero.date}</span>
              <span style="color: #0052ff; font-weight: 700; font-size: 14px;">Read Full Manual →</span>
            </div>
          </div>
        </div>
      `;
    }

    // 🌟 2. INDEX 1 & 2: Right Side 2 Cards Grid[cite: 10]
    let rightGridHTML = '';
    const rightCardsData = blogDatabase.slice(1, 3);
    
    rightCardsData.forEach(post => {
      rightGridHTML += `
        <div class="blog-master-card" onclick="window.location.href='blog-detailsw.html?id=${post.id}'">
          <div class="blog-image-thumb-frame">
            <img src="${post.image}" alt="${post.title}">
          </div>
          <div class="work-card-body" style="padding: 24px; display: flex; flex-direction: column; flex-grow: 1;">
            <div class="blog-meta-strip">
              <span class="author-pill">${post.tag}</span>
              <span>${post.readTime}</span>
            </div>
            <b style="font-size: 16.5px; display: block; color: var(--text); margin-top: 4px; font-family: 'Sora', sans-serif;">${post.title}</b>
            <p style="color: var(--muted); font-size: 13.5px; margin: 8px 0 20px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
              ${post.intro}
            </p>
            <div class="blog-card-footer">
              <span class="blog-meta-badge">🗓️ ${post.date}</span>
              <span class="read-anchor-btn">Read ↗</span>
            </div>
          </div>
        </div>
      `;
    });
    rightTopGridContainer.innerHTML = rightGridHTML;

    // 🌟 3. INDEX 3+: Bottom Row Cards[cite: 10]
    let bottomGridHTML = '';
    const bottomCardsData = blogDatabase.slice(3);
    
    if (bottomCardsData.length > 0) {
      magazineBottomGridContainer.style.display = 'grid';
      magazineBottomGridContainer.style.marginTop = '32px';
      
      bottomCardsData.forEach(post => {
        bottomGridHTML += `
          <div class="blog-master-card" onclick="window.location.href='blog-detailsw.html?id=${post.id}'">
            <div class="blog-image-thumb-frame">
              <img src="${post.image}" alt="${post.title}">
            </div>
            <div class="work-card-body" style="padding: 24px; display: flex; flex-direction: column; flex-grow: 1;">
              <div class="blog-meta-strip">
                <span class="author-pill">${post.tag}</span>
                <span>${post.readTime}</span>
              </div>
              <b style="font-size: 16px; display: block; color: var(--text); margin-top: 4px; font-family: 'Sora', sans-serif;">${post.title}</b>
              <p style="color: var(--muted); font-size: 13px; margin: 8px 0 20px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                ${post.intro}
              </p>
              <div class="blog-card-footer">
                <span class="blog-meta-badge">🗓️ ${post.date}</span>
                <span class="read-anchor-btn">Read ↗</span>
              </div>
            </div>
          </div>
        `;
      });
      magazineBottomGridContainer.innerHTML = bottomGridHTML;
    } else {
      magazineBottomGridContainer.style.display = 'none';
    }
  });
</script>
</body>
</html>
