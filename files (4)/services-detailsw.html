<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Details | Digital Whopper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<!-- 🌟 Exact main responsive stylesheet linked -->
<link rel="stylesheet" href="styleb.css">
<style>
  /* ==========================================================================
   📸 BRAND IMAGE LOGO MULTI-SCALE SYNCHRONIZATION
   ========================================================================== */
.logo-img-asset {
  height: 34px;          /* Sahi proportion aur height lock karne ke liye */
  width: auto;           /* Aspect ratio automatic sahi rahega */
  object-fit: contain;
  display: inline-block;
  margin-right: 2px;     /* "Digital Whopper" text se thoda gap rakhne ke liye */
}

  /* ==========================================================================
     🖼️ NO-CARD FULL WIDTH RE-CALIBRATED GRAPHIC STYLES
     ========================================================================== */
  .detail-hero-section {
    padding: 180px 0 80px !important; /* 🚀 Home page hero section se bilkul exact match padding */
    position: relative;
    z-index: 2;
    width: 100%;
  }
  
  .back-btn-wrapper {
    display: flex;
    justify-content: flex-start; 
    width: 100%;
    margin-bottom: 40px; /* Text se sahi gap maintain karne ke liye */
  }

  /* Split Layout Grid - Ab direct canvas layout par float karega (No card backdrop) */
  .detail-split-layout {
    display: grid;
    grid-template-columns: 1.15fr 0.85fr; /* Exact grid synchronization with home page layouts */
    gap: 48px;
    align-items: center;
    width: 100%;
  }

  .detail-text-col h1 {
    font-size: clamp(34px, 4.8vw, 58px); /* Exact h1 scale mapping with home template */
    font-weight: 700;
    letter-spacing: -.02em;
    line-height: 1.15;
    margin: 12px 0 24px;
    color: var(--text);
  }

  /* Media Panel Card Wrapper */
  .detail-media-panel {
    position: relative;
    width: 100%;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(0, 82, 255, 0.12);
    box-shadow: var(--card-shadow-default);
  }
  .detail-service-img {
    width: 100%;
    height: 320px;
    object-fit: cover;
    display: block;
  }

  /* ==========================================================================
     🧬 MICRO NODE VECTOR DIAGRAM SCHEMA
     ========================================================================== */
  .mini-diagram-box {
    position: relative;
    width: 100%;
    height: 110px;
    background: #ffffff;
    border: 1px dashed rgba(0, 82, 255, 0.15);
    border-radius: 16px;
    margin-top: 24px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 10px;
    overflow: hidden;
    box-shadow: var(--card-shadow-default);
  }
  .diagram-node {
    position: relative;
    background: #ffffff;
    border: 1px solid rgba(0, 82, 255, 0.12);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text);
    box-shadow: var(--card-shadow-default);
    z-index: 5;
    animation: floatingNode 3s ease-in-out infinite alternate;
  }
  .diagram-node:nth-child(2) { animation-delay: 0.5s; }
  .diagram-node:nth-child(3) { animation-delay: 1s; }

  .diagram-svg-lines {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  .diagram-svg-lines line {
    stroke: rgba(0, 82, 255, 0.18);
    stroke-width: 1.5;
    stroke-dasharray: 4 4;
  }

  /* Core Deliverables Formatting */
  .feature-list-render {
    margin-top: 24px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    list-style: none;
  }
  .feature-list-render li {
    font-size: 15px; color: var(--muted); display: flex; align-items: center; gap: 10px; font-weight: 500;
  }
  .feature-list-render li::before {
    content: "✦"; color: #0052ff; text-shadow: 0 0 8px rgba(0, 82, 255, 0.4); font-weight: 700;
  }

  @keyframes floatingNode {
    0% { transform: translateY(0); }
    100% { transform: translateY(-6px); }
  }

  /* 📱 Responsive Mobile Grid Adaptations */
  @media(max-width: 900px) { 
    .detail-hero-section { padding: 140px 0 40px !important; }
    .detail-split-layout { grid-template-columns: 1fr; text-align: center; gap: 40px; }
    .feature-list-render { grid-template-columns: 1fr; gap: 12px; } 
    .detail-service-img { height: 240px; }
    .mini-diagram-box { display: none; } 
    .back-btn-wrapper { justify-content: center; }
  }
</style>
</head>
<body>

<div class="custom-cursor" id="customCursor"></div>
<div class="custom-cursor-blur" id="customCursorBlur"></div>

<!-- 🌟 Global Injection Header Anchor Frame -->
<header id="mainHeader"></header>

<section class="detail-hero-section">
  <!-- 🛡️ Blobs are locked inside safety wrappers to shield the navbar matrix layout -->
  <div class="pink-blob"></div>
  <div class="purple-ambient-glow"></div>

  <!-- 🌟 Pure Full-Width Container Synced Globally -->
  <div class="wrap">
    
    <!-- Back Navigation Trigger Panel -->
    <div class="back-btn-wrapper">
      <a href="servicesw.html" class="btn btn-ghost" style="padding: 10px 22px; font-size: 13px; border-color: rgba(0, 82, 255, 0.15); color: #0052ff;">← Back to Services</a>
    </div>
    
    <!-- Split Infrastructure Deck (Direct Layout - No Card Box) -->
    <div class="detail-split-layout">
      
      <!-- Left Side: Header, Text Content and Deliverables Grid -->
      <div class="detail-text-col">
        <div style="font-size: 54px; margin-bottom: 4px;" id="serviceIcon">🚀</div>
        <h1 class="text-shine" id="serviceTitle">Loading Strategy...</h1>
        <p class="lead" id="serviceDesc" style="max-width: 580px; font-size: 16.5px; line-height: 1.6; color: var(--muted); margin-top: 16px;"></p>
        
        <div style="margin-top: 36px; border-top: 1px solid rgba(0, 82, 255, 0.08); padding-top: 24px;">
          <h3 style="color: #0052ff; font-size: 17px; font-family: 'Sora', sans-serif; font-weight: 700;">Core Deliverables Included:</h3>
          <ul class="feature-list-render" id="serviceFeatures"></ul>
        </div>
        
        <div style="margin-top: 40px;">
          <a href="https://wa.me/916200379161" target="_blank" class="btn btn-gold" style="padding: 15px 32px; font-size: 14.5px;">Deploy This Strategy Now ✦</a>
        </div>
      </div>

      <!-- Right Side: Graphic Visual Media Asset with Interactive Vector Diagram -->
      <div class="detail-graphic-col">
        <div class="detail-media-panel">
          <img src="" alt="Service Showcase" id="serviceImage" class="detail-service-img">
        </div>

        <!-- Micro Node Vector Diagram Integration Component -->
        <div class="mini-diagram-box">
          <svg class="diagram-svg-lines">
            <line x1="15%" y1="50%" x2="50%" y2="50%"></line>
            <line x1="50%" y1="50%" x2="85%" y2="50%"></line>
          </svg>
          <div class="diagram-node" id="nodeTag1">Analysis</div>
          <div class="diagram-node" id="nodeTag2">Execution</div>
          <div class="diagram-node" id="nodeTag3">Scale Up</div>
        </div>
      </div>

    </div>

  </div>
</section>

<!-- Global Injection Footer Frame -->
<footer id="footer"></footer>

<!-- 🌟 Swapped to scriptb.js to lock matching Top Dropdown Menu functionality -->
<script src="scriptb.js"></script>

<script>
  // Database Engine Mapping Presets
  const serviceDatabase = [
    { title: "Performance Marketing", icon: "🚀", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=600&q=80", desc: "We plan, execute, and scale aggressive ad matrix campaigns across Meta and Google networks. No vanity metrics—pure focus on incremental margins and volume scalability.", features: ["Funnel Architecture Planning", "CBO Scaling Protocols", "Ad Creative Matrix Mapping", "ROAS Optimization System"], nodes: ["Funnel Blueprint", "Ad Deploy", "ROAS Optimization"] },
    { title: "SEO Domination Systems", icon: "🔍", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=600&q=80", desc: "Reverse-engineering organic search behavior. We build scalable content clusters, high-authority backlink parameters, and technical speed frameworks that win rank positions permanently.", features: ["Intent Keyword Architecture", "Core Web Vitals Boost", "High-Velocity Link Outreach", "Semantic Content Mapping"], nodes: ["Clusters Audit", "Link Outreach", "Rank Tracking"] },

    { title: "UI/UX Cyber Blueprints", icon: "🖼️", img: "https://images.unsplash.com/photo-1541462608141-ad4979e408c9?auto=format&fit=crop&w=600&q=80", desc: "Design is product psychology. We create high-fidelity high-contrast dark wireframes and user journeys built to reduce bounce rates and enforce micro-actions.", features: ["Interactive Wireframing", "Figma Prototype Execution", "Conversion Heatmap Tuning", "Neuromarketing Visual Tones"], nodes: ["User Research", "Figma Design", "Heatmap Check"] },

</script>
</body>
</html>
